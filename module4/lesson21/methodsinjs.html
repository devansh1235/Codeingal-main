<!DOCTYPE html>
<html>

<head>
    <title>Methods in Js </title>
</head>

<body>
    <h1>
        JavaScript Methods
    </h1>
    <script>
        var str = "AmAzInG";
        document.write(str.toUpperCase())
        document.write("<br>")
        document.write(str.toLowerCase())
        document.write("<br>")
        document.write(str.startsWith("I"))
        document.write("<br>")
        document.write(Math.random())
        document.write("<br>")
        document.write(Math.random() * 100)
        document.write("<br>")
        document.write(Math.floor(2.1)) /*random and floor method are taken from  math object*/
        document.write("<br>")
        document.write(Math.sqrt(16)) 
    </script>
</body>

</html>
