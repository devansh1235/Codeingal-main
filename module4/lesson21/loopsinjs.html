<!DOCTYPE html>
<html>

<head>
    <title>For loop in html </title>
</head>

<body>
    <h1>
    For loop in html 
    </h1>
    <p id="demo"></p>
    <script>
        var fruits=['apple', 'bannana','watermelon', 'pineapple'] /*array with string elements*/
        for(i=0;i<fruits.length;i++){
            var text=fruits[i]+"<br>";
            document.write(text)
            // document.getElementById("demo").innerHTML=text

        }
    </script>
</body>

</html>
