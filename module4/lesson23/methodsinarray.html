<!DOCTYPE html>
<html>

<head>

    <title>
        Array methods in Js </title>
</head>

<body>
    <p>
        Join method joins array elements. And pop mehtod removes the last element from an array.
    </p>
    <p id="join1">
    </p>

    <p id="pop1"></p>
    <p id="pop2"></p>
    <script>
        var fruits = ["apple", "pineapple", "watermelon", "mango"]

        document.getElementById('join1').innerHTML = fruits.join("*")
    document.getElementById('pop1').innerHTML = fruits 
    fruits.pop()
    document.getElementById('pop2').innerHTML = fruits 
    
    </script>
    


</body>

</html>
