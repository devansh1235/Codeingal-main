<!DOCTYPE html>

</head>

<body>
    <h1> Call stack in js </h1>
    <p id="demo">
    </p>
    <script>
        function add(a,b){ // function definition for add 
            return a+b ;
        }

        function average(a,b){ // funtion defintion for average 
            return add(a,b)/2; // funtion call for add 
        }

        let result=average(10,20); // funtion call for average
        document.getElementById('demo').innerHTML=result ;
    </script>


</body>

</html>
