<!-- Outline:
In this activity, learn about arguments objects and find the biggest number in the given argument. -->
<!DOCTYPE html>
<html>

<head>

<title>
    arguement object
</title>
</head>

<body>
    <h1> arguement object</h1>
<p >Finding the largest number with the help of arguement object</p>
<p id="demo"> </p>
    <script>
    function findMax(){ /*function definition*/
        var max=0;
        for(i=0;i<arguments.length;i++){ 
            if (arguments [i]>max){
                max=arguments[i]
            }
        }
        return max;
    }

    document.getElementById('demo').innerHTML=findMax(8,4,8,50,7,55,2) /*function call*/
    </script>
</body>

</html>
